<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Daily Vocab</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        .word-card { 
            background: #fff; border-radius: 12px; padding: 25px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid #007bff;
            transition: all 0.3s ease;
        }
        .word-card:hover { transform: translateY(-5px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .english { font-size: 26px; font-weight: 700; color: #007bff; cursor: pointer; }
        .english:hover { text-decoration: underline; }
        .chinese { font-size: 18px; font-weight: 500; color: #555; }
        
        .example-section { background: #f1f3f5; border-radius: 8px; padding: 15px; font-size: 15px; }
        .example-item { margin-bottom: 10px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
        .example-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .ex-en { color: #444; font-weight: 500; display: block; cursor: pointer; }
        .ex-en:hover { color: #0056b3; }
        .ex-zh { color: #777; display: block; margin-top: 3px; }
        
        .play-btn { background: #007bff; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .play-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h1>TOEIC 每日單字</h1>

    <div id="word-list">
        </div>
</div>

<script>
    // --- 每天更新這裡的內容即可 ---
    const vocabData = [
        {
            en: "address",
            zh: "處理",
            ex1_en: "The committee must address the safety concerns immediately.",
            ex1_zh: "委員會應立即針對安全問題採取行動。",
        },
        {
            en: "afford",
            zh: "負擔得起",
            ex1_en: "Most employees can afford to eat at the local cafeteria.",
            ex1_zh: "大多數員工都負擔得起在當地餐廳用餐的費用。",
        }
        {
            en: "amenities",
            zh: "便利設施",
            ex1_en: "The hotel provides many modern amenities for its guests.",
            ex1_zh: "這家旅館提供很多現代化的設備供客人使用。",
        }
        {
            en: "antibiotic",
            zh: "抗生素",
            ex1_en: "The doctor will prescribe an antibiotic for your infection.",
            ex1_zh: "醫師將為您的感染病灶開立抗生素藥物。",
        }
        {
            en: "application",
            zh: "申請",
            ex1_en: "We appreciate your hard work on this difficult project.",
            ex1_zh: "我們很感謝你在這個艱難專案中所付出的辛勞。",
        }
        {
            en: "attend",
            zh: "參加",
            ex1_en: "All staff members must attend the safety seminar tomorrow.",
            ex1_zh: "全體員工明天都必須參加安全研討會。",
        }
        {
            en: "boardroom",
            zh: "董事會會議室",
            ex1_en: "The executive team is meeting in the boardroom now.",
            ex1_zh: "執行長團隊目前正於董事會會議室進行會議。",
        }
        {
            en: "cafeteria",
            zh: "自助餐廳",
            ex1_en: "The office cafeteria offers a variety of healthy meals.,
            ex1_zh: "公司的食堂有很多健康的菜色可以選。",
        }
        {
            en: "catering",
            zh: "外燴",
            ex1_en: "The company will hire a catering service for the party.,
            ex1_zh: "公司將針對此次聚會委託專業餐飲承包商提供服務。",
        }
    
        // 你可以依照這個格式繼續增加 10 個
    ];

    const listContainer = document.getElementById('word-list');

    vocabData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `
            <div class="header-row">
                <div>
                    <span class="english" onclick="speak('${item.en}')">${item.en}</span>
                    <div class="chinese">${item.zh}</div>
                </div>
                <button class="play-btn" onclick="speak('${item.en}')">🔊</button>
            </div>
            <div class="example-section">
                <div class="example-item">
                    <span class="ex-en" onclick="speak('${item.ex1_en.replace(/'/g, "\\'")}')">1. ${item.ex1_en}</span>
                    <span class="ex-zh">${item.ex1_zh}</span>
                </div>
                <div class="example-item">
                    <span class="ex-en" onclick="speak('${item.ex2_en.replace(/'/g, "\\'")}')">2. ${item.ex2_en}</span>
                    <span class="ex-zh">${item.ex2_zh}</span>
                </div>
            </div>
        `;
        listContainer.appendChild(card);
    });

    function speak(text) {
        const synth = window.speechSynthesis;
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'en-US';
        utterThis.rate = 0.9;
        synth.speak(utterThis);
    }
</script>

</body>
</html>
